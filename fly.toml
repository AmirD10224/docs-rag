app = "docs-rag"
primary_region = "iad"
kill_signal = "SIGINT"
kill_timeout = "10s"

[build]
  dockerfile = "Dockerfile"

[env]
  APP_ENV = "prod"
  LOG_LEVEL = "INFO"
  MOCK_PROVIDERS = "false"
  PORT = "8000"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    soft_limit = 25
    hard_limit = 50

[[http_service.checks]]
  interval = "15s"
  timeout = "3s"
  grace_period = "20s"
  method = "GET"
  path = "/healthz"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory = "1gb"

# Secrets (set via `fly secrets set`):
#   ANTHROPIC_API_KEY, COHERE_API_KEY, JINA_API_KEY,
#   QDRANT_URL, QDRANT_API_KEY, REDIS_URL, ALLOWED_ORIGINS
